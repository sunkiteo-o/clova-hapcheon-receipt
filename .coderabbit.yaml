# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ko-KR"
reviews:
  profile: "chill"
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*"
      instructions: |
        모든 리뷰 코멘트에는 가능한 한 중요도를 표시한다.

        - [Blocker] 반드시 수정: 빌드 실패, 런타임 버그, 보안, 데이터 손실, 권한 우회
        - [Major] 수정 권장: 유지보수성, 아키텍처, 성능, 접근성, 타입 안정성에 의미 있는 영향
        - [Minor] 가벼운 개선: 가독성, 일관성, 작은 리팩터링
        - [Nit] 선택 사항: 취향성 제안, 사소한 네이밍/문장 개선

        코멘트 형식:
        [Severity] 문제 요약

        왜 문제가 되는지 간단히 설명하고, 가능하면 수정 방향을 제안한다.

        Biome가 자동 처리하는 포매팅, import 정렬, 단순 lint 위반은 리뷰하지 않는다.
        리뷰는 설계, 상태 관리, React/Next 사용 방식, 타입 안정성, 접근성, 보안/데이터 경계, 디자인 토큰 사용에 집중한다.
knowledge_base:
  code_guidelines:
    enabled: false
